# 拼多多:打开 → 搜索"玩具" → 抓取商品列表(标题/价格/销量)
#
# 经真机实测确认:拼多多为原生 Android 应用(非 Flutter),TextView/ImageView
# 可正常抓取,resource-id 可靠。结果页结构稳定:
#   - 标题:resource-id 结尾为 tv_title,完整标题在 content-desc(text 会被截断)
#   - 价格/销量:卡片内连续 3 个 pdd-id 文本节点 [¥, 价格, 销量]
# 因此用 script 步骤按卡片分组解析,而非 extract 扁平抓取。
name: 拼多多-搜索玩具-采集商品列表
description: |
  打开拼多多 → 搜索"玩具" → 抽取搜索结果页商品列表。
  采集字段:商品标题(完整)、价格、销量。
  共采集 3 屏(swipe 加载更多),每屏一份 batch。
tags: [拼多多, 采集, 爬虫]

variables:
  pkg: com.xunmeng.pinduoduo
  keyword: 玩具

steps:
  # 0. 启动拼多多
  - start_app:
      package: "${pkg}"
  - wait:
      seconds: 6

  # 1. 点击首页顶部搜索框(content_desc=搜索,占位文案含推荐词)
  - click:
      content_desc: "搜索"
      timeout: 8
  - wait:
      seconds: 2

  # 2. 输入关键字(聚焦框已就绪,直接输入)
  - input:
      text: "${keyword}"
      clear: true
  - wait:
      seconds: 1

  # 3. 点击搜索按钮触发搜索(结果页搜索按钮 text="搜索")
  - click:
      text: "搜索"
      timeout: 5
  - wait:
      seconds: 4

  # 4. 断言已进入搜索结果页(出现价格符 ¥)
  - assert:
      exists:
        text_contains: "¥"
        timeout: 8

  # 5. 首屏解析:按卡片分组抽取标题/价格/销量
  #    价格/销量按内容正则匹配,而非固定下标 —— 部分卡片会多出"先用后付"
  #    等标签,导致 [¥,价,销量] 顺序下标错位。
  - script:
      as: batch_0
      code: |
        root = ET.fromstring(device.dump_hierarchy())
        pm = {c: p for p in root.iter("node") for c in p}
        price_re = re.compile(r"^\d+(?:\.\d+)?$")
        sales_re = re.compile(r"(已拼|已抢|总售|总销量|已售)")
        result = []
        for n in root.iter("node"):
            if n.attrib.get("resource-id", "").endswith("tv_title"):
                card, cur = n, n
                for _ in range(10):
                    cur = pm.get(cur)
                    if cur is None:
                        break
                    cnt = sum(1 for x in cur.iter("node")
                              if x.attrib.get("resource-id", "").endswith("pdd")
                              and x.attrib.get("text", "").strip())
                    if cnt >= 3:
                        card = cur
                        break
                pdd = [x.attrib.get("text", "")
                       for x in card.iter("node")
                       if x.attrib.get("resource-id", "").endswith("pdd")
                       and x.attrib.get("text", "").strip()]
                price = next((t for t in pdd if price_re.match(t)), "")
                sales = next((t for t in pdd if sales_re.search(t)), "")
                result.append({
                    "title": n.attrib.get("content-desc", "").strip(),
                    "price": price,
                    "sales": sales,
                })

  # 6-7. 上滑加载更多并解析(第 2 屏)
  - swipe:
      direction: up
      scale: 0.6
  - wait:
      seconds: 2
  - script:
      as: batch_1
      _name: 07_script_batch_1
      code: |
        root = ET.fromstring(device.dump_hierarchy())
        pm = {c: p for p in root.iter("node") for c in p}
        price_re = re.compile(r"^\d+(?:\.\d+)?$")
        sales_re = re.compile(r"(已拼|已抢|总售|总销量|已售)")
        result = []
        for n in root.iter("node"):
            if n.attrib.get("resource-id", "").endswith("tv_title"):
                card, cur = n, n
                for _ in range(10):
                    cur = pm.get(cur)
                    if cur is None:
                        break
                    cnt = sum(1 for x in cur.iter("node")
                              if x.attrib.get("resource-id", "").endswith("pdd")
                              and x.attrib.get("text", "").strip())
                    if cnt >= 3:
                        card = cur
                        break
                pdd = [x.attrib.get("text", "")
                       for x in card.iter("node")
                       if x.attrib.get("resource-id", "").endswith("pdd")
                       and x.attrib.get("text", "").strip()]
                price = next((t for t in pdd if price_re.match(t)), "")
                sales = next((t for t in pdd if sales_re.search(t)), "")
                result.append({
                    "title": n.attrib.get("content-desc", "").strip(),
                    "price": price,
                    "sales": sales,
                })

  # 8-9. 上滑加载更多并解析(第 3 屏)
  - swipe:
      direction: up
      scale: 0.6
  - wait:
      seconds: 2
  - script:
      as: batch_2
      _name: 09_script_batch_2
      code: |
        root = ET.fromstring(device.dump_hierarchy())
        pm = {c: p for p in root.iter("node") for c in p}
        price_re = re.compile(r"^\d+(?:\.\d+)?$")
        sales_re = re.compile(r"(已拼|已抢|总售|总销量|已售)")
        result = []
        for n in root.iter("node"):
            if n.attrib.get("resource-id", "").endswith("tv_title"):
                card, cur = n, n
                for _ in range(10):
                    cur = pm.get(cur)
                    if cur is None:
                        break
                    cnt = sum(1 for x in cur.iter("node")
                              if x.attrib.get("resource-id", "").endswith("pdd")
                              and x.attrib.get("text", "").strip())
                    if cnt >= 3:
                        card = cur
                        break
                pdd = [x.attrib.get("text", "")
                       for x in card.iter("node")
                       if x.attrib.get("resource-id", "").endswith("pdd")
                       and x.attrib.get("text", "").strip()]
                price = next((t for t in pdd if price_re.match(t)), "")
                sales = next((t for t in pdd if sales_re.search(t)), "")
                result.append({
                    "title": n.attrib.get("content-desc", "").strip(),
                    "price": price,
                    "sales": sales,
                })

  # 10. 返回退出搜索
  - press:
      key: back
  - wait:
      seconds: 1
